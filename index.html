<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest — Learn Python by Playing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="loading-splash" class="splash">
  <div class="splash-inner">
    <div class="splash-robot">🤖</div>
    <h1>Code Quest</h1>
    <p id="splash-status">Waking up the Python engine…</p>
    <div class="splash-bar"><div id="splash-bar-fill" class="splash-bar-fill"></div></div>
  </div>
</div>

<div id="app" class="app hidden">

  <header class="app-header">
    <div class="brand">🤖 <span>Code Quest</span></div>
    <div class="stats">
      <div class="stat" id="stat-streak" title="Play on consecutive days to build a streak">🔥 <span id="streak-count">0</span> day streak</div>
      <div class="stat" id="stat-xp" title="Total XP">⭐ <span id="xp-count">0</span> XP</div>
      <div class="stat" id="stat-rank" title="Rank"><span id="rank-name">Novice</span></div>
      <button id="syntax-panel-toggle" class="btn btn-ghost btn-small" title="Python syntax guide">🧩 Syntax</button>
      <button id="reset-progress-btn" class="btn btn-ghost btn-small" title="Reset all progress">↺</button>
    </div>
  </header>

  <main id="screen-root" class="screen-root">
    <section id="map-screen" class="screen"></section>
    <section id="challenge-screen" class="screen hidden"></section>
  </main>

</div>

<div id="modal-root"></div>
<div id="syntax-panel-root"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
